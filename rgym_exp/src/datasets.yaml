# Composite Dataset Configuration for Reasoning Gym
# This file defines multiple datasets with their weights and configurations

size: 1000  # Total virtual size of the composite dataset
seed: 42    # Seed for reproducibility

datasets:
  - name: arc_1d
    weight: 1
    config:
      min_size: 10
      max_size: 11
      num_train: 3
      seed: 42
      size: 500

  # Basic arithmetic operations
  - name: basic_arithmetic
    weight: 1
    config:
      min_terms: 2
      max_terms: 3
      min_digits: 1
      max_digits: 2
      operators: ["+", "-", "*", "/"]
      allow_parentheses: true
      allow_negation: true
      format_style: "natural"
      whitespace: "single"
      seed: 1234
      size: 500
  
  # Base Conversion
  - name: base_conversion
    weight: 1
    config:
      min_base: 2
      max_base: 3
      min_value: 499
      max_value: 500
      seed: 1239
      size: 500

  # BrainF***
  - name: bf
    weight: 1
    config: 
      difficulty: 1
      seed: 1238
      size: 500

  # Binary Matrix
  - name: binary_matrix
    weight: 1
    config:
      min_n: 3
      max_n: 4
      p_zero: 0.25
      seed: 1236
      size: 500
      
  # Calendar arithmetic for date calculations
  - name: calendar_arithmetic
    weight: 1
    config:
      year: 2023
      offset_upper_bound: 100
      leap_year_range: 200
      tasks: ["count_days", "weekday_of_date", "is_leap_year", "recurring_event_day"]
      seed: 1237
      size: 500

  # Decimal arithmetic for more complex calculations
  - name: decimal_arithmetic
    weight: 1
    config:
      min_terms: 2
      max_terms: 3
      min_num_decimal_places: 1
      max_num_decimal_places: 2
      precision: 5  
      seed: 1235
      size: 500
      
  # Fraction simplification problems
  - name: fraction_simplification
    weight: 1
    config:
      min_value: 1
      max_value: 2
      min_factor: 2
      max_factor: 2
      styles: ["plain", "latex_frac", "latex_dfrac"]
      seed: 1236
      size: 500
      
  # Logic puzzles
  - name: propositional_logic
    weight: 1
    config:
      min_vars: 2
      max_vars: 3
      min_statements: 2
      max_statements: 3
      min_complexity: 1
      max_complexity: 2
      seed: 1238
      size: 500
